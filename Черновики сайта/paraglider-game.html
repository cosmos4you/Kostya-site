<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Парапланерист</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87ceeb; }
    canvas { display: block; cursor: none; }

    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: #27211d;
    }
    .overlay.hidden { display: none; }

    .glass {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 40px 52px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }
    .big-emoji { font-size: 4rem; line-height: 1; }
    .game-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
    .game-sub   { font-size: 0.95rem; color: #6b5e55; line-height: 1.5; }
    .score-label { font-size: 1rem; color: #6b5e55; }
    .score-big   { font-size: 3.5rem; font-weight: 900; color: #27211d; line-height: 1; }
    .best-label  { font-size: 0.9rem; color: #9b8e85; }

    .btn {
      margin-top: 6px;
      padding: 14px 44px;
      border: none; border-radius: 18px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #78b39b, #5a9a82);
      color: #fff;
      box-shadow: 0 6px 20px rgba(120,179,155,0.45);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(120,179,155,0.5); }
    .btn:active { transform: scale(0.96); }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<!-- START -->
<div class="overlay" id="start">
  <div class="glass">
    <div class="big-emoji">🪂</div>
    <div class="game-title">Парапланерист</div>
    <div class="game-sub">Веди параплан мышкой или пальцем.<br>Уворачивайся от шаров!</div>
    <button class="btn" onclick="startGame()">Полетели!</button>
  </div>
</div>

<!-- GAME OVER -->
<div class="overlay hidden" id="gameover">
  <div class="glass">
    <div class="big-emoji">💥</div>
    <div class="game-title">Упс!</div>
    <div class="score-label">Ты продержался</div>
    <div class="score-big" id="final-score">0 сек</div>
    <div class="best-label" id="best-label"></div>
    <button class="btn" onclick="startGame()">Ещё раз!</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── state ──
let alive       = false;
let startTs     = null;
let score       = 0;
let best        = 0;
let frameId     = null;
let lastSpawn   = 0;
let spawnDelay  = 1100;
let balls       = [];
let clouds      = [];
let particles   = [];
let frame       = 0;

// ── player ──
const P = { x: 200, y: 300, tx: 200, ty: 300, size: 52 };

// ── input ──
function setTarget(x, y) { P.tx = x; P.ty = y; }
canvas.addEventListener('mousemove', e => setTarget(e.clientX, e.clientY));
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  setTarget(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  setTarget(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

// ── clouds init ──
function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 50 + Math.random() * H * 0.5,
      scale: 0.6 + Math.random() * 0.8,
      speed: 0.2 + Math.random() * 0.3,
    });
  }
}

// ── spawn ball ──
const BALL_COLORS = ['#ff6b6b','#ffd43b','#69db7c','#4dabf7','#ff922b','#da77f2','#f783ac','#63e6be'];
function spawnBall(speed) {
  const fromTop = Math.random() > 0.5;
  const r       = 16 + Math.random() * 20;
  balls.push({
    x:     r + Math.random() * (W - r * 2),
    y:     fromTop ? -r - 10 : H + r + 10,
    vy:    fromTop ? speed : -speed,
    vx:    (Math.random() - 0.5) * 2.2,
    r,
    color: BALL_COLORS[Math.floor(Math.random() * BALL_COLORS.length)],
  });
}

// ── burst particles on death ──
function burst(x, y) {
  for (let i = 0; i < 24; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 3 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: 4 + Math.random() * 6,
      life: 1,
      color: BALL_COLORS[Math.floor(Math.random() * BALL_COLORS.length)],
    });
  }
}

// ── collision ──
function hitTest() {
  const hx = P.x, hy = P.y + 6, hr = P.size * 0.28;
  for (const b of balls) {
    const dx = hx - b.x, dy = hy - b.y;
    if (Math.sqrt(dx*dx + dy*dy) < hr + b.r - 4) return true;
  }
  return false;
}

// ── draw helpers ──
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,   '#5eb8e8');
  g.addColorStop(0.6, '#a8d8f0');
  g.addColorStop(1,   '#fde8c4');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawCloud(x, y, s) {
  ctx.save();
  ctx.globalAlpha = 0.65;
  ctx.fillStyle = '#fff';
  [[0,0,62,24],[-32,6,42,19],[38,5,48,20]].forEach(([dx,dy,rw,rh]) => {
    ctx.beginPath();
    ctx.ellipse(x+dx*s, y+dy*s, rw*s, rh*s, 0, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
}

function drawBall(b) {
  ctx.save();
  const g = ctx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.35, b.r*0.1, b.x, b.y, b.r);
  g.addColorStop(0,   '#fff');
  g.addColorStop(0.35, b.color);
  g.addColorStop(1,   b.color + 'aa');
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.shadowColor = b.color;
  ctx.shadowBlur  = 14;
  ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  // subtle shadow
  ctx.globalAlpha = 0.18;
  ctx.filter = 'blur(6px)';
  ctx.font = P.size + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🪂', P.x + 4, P.y + 8);
  ctx.restore();
  // emoji
  ctx.font = P.size + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🪂', P.x, P.y);
}

function drawScore(elapsed) {
  const s = Math.floor(elapsed);
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 64, 14, 128, 44, 14);
  ctx.fill();
  ctx.fillStyle = '#27211d';
  ctx.font = 'bold 22px "Avenir Next", Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(s + ' сек', W/2, 36);
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  }
}

// ── main loop ──
function loop(ts) {
  frameId = requestAnimationFrame(loop);

  if (!startTs) startTs = ts;
  const elapsed = (ts - startTs) / 1000;

  // difficulty
  const speed = 2.8 + elapsed * 0.07;
  spawnDelay  = Math.max(380, 1100 - elapsed * 14);

  // smooth follow
  P.x += (P.tx - P.x) * 0.13;
  P.y += (P.ty - P.y) * 0.13;

  // spawn
  if (ts - lastSpawn > spawnDelay) {
    spawnBall(speed);
    lastSpawn = ts;
  }

  // update balls
  for (const b of balls) { b.x += b.vx; b.y += b.vy; }
  balls = balls.filter(b => b.y > -120 && b.y < H + 120 && b.x > -120 && b.x < W + 120);

  // update clouds
  for (const c of clouds) {
    c.x += c.speed;
    if (c.x > W + 200) c.x = -200;
  }

  // update particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.035;
  }
  particles = particles.filter(p => p.life > 0);

  // collision
  if (hitTest()) {
    burst(P.x, P.y);
    alive = false;
    score = Math.floor(elapsed);
    if (score > best) best = score;
    cancelAnimationFrame(frameId);
    // draw one last frame then show gameover
    draw(elapsed);
    setTimeout(showGameOver, 600);
    return;
  }

  draw(elapsed);
  frame++;
}

function draw(elapsed) {
  drawSky();
  for (const c of clouds) drawCloud(c.x, c.y, c.scale);
  for (const b of balls)   drawBall(b);
  if (alive) drawPlayer();
  drawParticles();
  if (alive) drawScore(elapsed);
}

// ── screens ──
function showGameOver() {
  document.getElementById('final-score').textContent = score + ' сек';
  const bl = document.getElementById('best-label');
  bl.textContent = score >= best ? '🏆 Новый рекорд!' : 'Рекорд: ' + best + ' сек';
  document.getElementById('gameover').classList.remove('hidden');
}

function startGame() {
  document.getElementById('start').classList.add('hidden');
  document.getElementById('gameover').classList.add('hidden');

  balls     = [];
  particles = [];
  frame     = 0;
  startTs   = null;
  lastSpawn = 0;
  alive     = true;

  P.x = P.tx = W / 2;
  P.y = P.ty = H / 2;

  initClouds();

  if (frameId) cancelAnimationFrame(frameId);
  frameId = requestAnimationFrame(loop);
}

// draw idle sky on load
drawSky();
initClouds();
for (const c of clouds) drawCloud(c.x, c.y, c.scale);
ctx.font = '80px serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('🪂', W/2, H/2);
</script>
</body>
</html>
